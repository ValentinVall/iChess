services:
  postgres:
    image: postgres:15-alpine
    container_name: ichess-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-ichess}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ichess-network

  backend:
    image: node:18-alpine
    container_name: ichess-backend
    working_dir: /app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-ichess}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      FRONTEND_URL: http://localhost:5173
      APPLE_KEY_ID: ${APPLE_KEY_ID:-your-key-id}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-your-team-id}
      APPLE_BUNDLE_ID: ${APPLE_BUNDLE_ID:-com.ichess.app}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./database:/database:ro
      - backend_node_modules:/app/node_modules
    networks:
      - ichess-network
    command: sh -c "npm install --legacy-peer-deps && npm run dev"

  frontend:
    image: node:18-alpine
    container_name: ichess-frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_APP_NAME: iChess Premium
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - ichess-network
    command: sh -c "npm install --legacy-peer-deps --force && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  ichess-network:
    driver: bridge
